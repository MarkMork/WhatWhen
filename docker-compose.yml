services:
  whatwhen:
    image: ghcr.io/markmork/whatwhen:latest
    # To build from source instead of pulling, comment out the line above and
    # uncomment the next one:
    # build: .
    container_name: whatwhen
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # Override the listen port or data file location if you like.
      - PORT=8080
      - DATA_FILE=/data/whatwhen.json
    volumes:
      - whatwhen-data:/data

volumes:
  whatwhen-data:
