services:
  whatwhen:
    build: .
    image: whatwhen
    container_name: whatwhen
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # Override the listen port or data file location if you like.
      - PORT=8080
      - DATA_FILE=/data/whatwhen.json
    volumes:
      - whatwhen-data:/data

volumes:
  whatwhen-data:
