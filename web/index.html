<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#4f46e5" />
  <title>WhatWhen</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="style.css" />
  <script>
    // Apply a saved theme before first paint to avoid a flash.
    (function () {
      var t = localStorage.getItem("whatwhen-theme");
      if (t) document.documentElement.setAttribute("data-theme", t);
    })();
  </script>
</head>
<body>
  <header class="app-header">
    <div class="header-controls">
      <button id="lock-toggle" class="ctrl-btn lock-toggle" type="button" aria-pressed="false">
        <span class="lock-icon" aria-hidden="true">🔒</span>
        <span class="lock-text">Locked</span>
      </button>
      <button id="theme-toggle" class="ctrl-btn theme-toggle" type="button" aria-label="Toggle light/dark theme">
        <span class="theme-icon" aria-hidden="true">🌙</span>
      </button>
    </div>
    <h1 class="app-logo">
      <svg class="logo" viewBox="210 28 260 184" xmlns="http://www.w3.org/2000/svg" role="img">
        <title>WhatWhen logo</title>
        <desc>Two interlocking W letterforms with tighter overlap — top in dark slate, bottom in indigo — with split-colour wordmark.</desc>
        <g transform="translate(340, 40)">
          <g transform="translate(-39, 0)">
            <!-- Top W -->
            <path fill="currentColor"
              d="M0,0 L15,60 L32,20 L49,60 L64,0
                 L55,0 L49,42 L32,2 L15,42 L9,0 Z"/>
            <!-- Bottom W -->
            <path fill="#4f46e5"
              d="M0,26 L15,86 L32,46 L49,86 L64,26
                 L55,26 L49,68 L32,28 L15,68 L9,26 Z"/>
          </g>
          <text y="132" text-anchor="middle"
            font-family="system-ui, -apple-system, sans-serif" font-weight="500" font-size="36" letter-spacing="5">
            <tspan fill="currentColor">What</tspan><tspan fill="#4f46e5">When</tspan>
          </text>
          <text x="0" y="160" text-anchor="middle"
            font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="13" letter-spacing="2"
            fill="#64748b">track when you last did anything</text>
        </g>
      </svg>
    </h1>
  </header>

  <main>
    <form id="add-form" class="add-form" autocomplete="off">
      <input
        id="add-input"
        type="text"
        name="label"
        maxlength="100"
        placeholder="Add a task — e.g. Change the beds"
        aria-label="New task label"
        required
      />
      <button type="submit" class="btn btn-add">Add</button>
    </form>

    <section id="grid" class="grid" aria-live="polite"></section>

    <p id="empty" class="empty hidden">
      No tasks yet. Add one above to start tracking when you last did it.
    </p>
  </main>

  <script src="app.js"></script>
</body>
</html>
